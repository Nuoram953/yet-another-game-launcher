name: Build

on:
  release:
    types: [published]

jobs:
  build-tauri:
    name: Tauri (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: --config src-tauri/app/tauri.conf.json
          - platform: macos-latest
            args: --config src-tauri/app/tauri.conf.json --target universal-apple-darwin
            extra-rust-targets: x86_64-apple-darwin
          - platform: windows-latest
            args: --config src-tauri/app/tauri.conf.json
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.extra-rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          tauriScript: pnpm exec tauri
          args: ${{ matrix.args }}

  build-cli:
    name: CLI (${{ matrix.target }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            binary: app
            artifact: yagl-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: app
            artifact: yagl-macos-aarch64
          - target: x86_64-apple-darwin
            os: macos-13
            binary: app
            artifact: yagl-macos-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: app.exe
            artifact: yagl-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --manifest-path src-tauri/Cargo.toml -p app --bin app

      - name: Rename binary
        shell: bash
        run: cp src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
