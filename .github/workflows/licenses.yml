name: Licenses

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: licenses-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          allow-licenses: 0BSD, Apache-2.0, Apache-2.0 WITH LLVM-exception, BSD-2-Clause, BSD-3-Clause, BSL-1.0, CC0-1.0, ISC, MIT, MIT-0, MPL-2.0, Unicode-3.0, Unicode-DFS-2016, Unlicense, Zlib

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Check Rust dependency licenses
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ./src-tauri/Cargo.toml
          command: check
          arguments: --all-features
          command-arguments: licenses

  repo-license:
    name: Repository license metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify top-level license file
        run: test -f LICENSE

      - name: Verify package.json license metadata
        run: |
          grep -Eq '"license": "MIT"' package.json

      - name: Verify Cargo manifest license metadata
        run: |
          for manifest in src-tauri/app/Cargo.toml src-tauri/cli/Cargo.toml src-tauri/core/Cargo.toml; do
            grep -Eq '^license = "MIT"$' "$manifest"
          done
